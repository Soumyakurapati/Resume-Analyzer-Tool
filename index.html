<!DOCTYPE html>
<html>

<head>
<title>AI Resume Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<div class="container">


<h1>🚀 AI Resume Analyzer</h1>

<p>Analyze your resume and improve your job readiness</p>


<input type="file" id="pdfFile" accept=".pdf">


<label for="pdfFile" class="upload">
Upload Resume PDF
</label>



<textarea id="resumeText"
placeholder="Resume text will appear here..."></textarea>


<textarea id="jobDesc"
placeholder="Paste Job Description here..."></textarea>


<button onclick="analyzeResume()">
Analyze Resume
</button>



<div id="result"></div>



</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="script.js"></script>


</body>

</html>
